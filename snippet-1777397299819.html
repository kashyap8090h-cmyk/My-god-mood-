<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G0DM0D3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a2e;
            --accent-green: #00ff41;
            --accent-cyan: #00e5ff;
            --accent-purple: #b388ff;
            --accent-red: #ff1744;
            --text-primary: #e0e0e0;
            --text-secondary: #9e9e9e;
            --text-muted: #616161;
            --border-color: #2a2a3e;
            --glow-green: 0 0 10px rgba(0, 255, 65, 0.3);
            --glow-cyan: 0 0 10px rgba(0, 229, 255, 0.3);
            --glow-purple: 0 0 10px rgba(179, 136, 255, 0.3);
        }

        body {
            font-family: 'Courier New', 'Fira Code', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scanline overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 65, 0.015) 2px,
                rgba(0, 255, 65, 0.015) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* Matrix rain canvas */
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.06;
        }

        /* Header */
        .header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px 20px 20px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(180deg, var(--bg-secondary), transparent);
        }

        .header h1 {
            font-size: 3.5rem;
            letter-spacing: 12px;
            color: var(--accent-green);
            text-shadow: var(--glow-green), 0 0 40px rgba(0, 255, 65, 0.15);
            animation: flicker 4s infinite alternate;
            margin-bottom: 8px;
        }

        .header .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .header .version {
            display: inline-block;
            margin-top: 12px;
            padding: 3px 14px;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            font-size: 0.7rem;
            border-radius: 2px;
            letter-spacing: 3px;
        }

        @keyframes flicker {
            0%, 95% { opacity: 1; }
            96% { opacity: 0.8; }
            97% { opacity: 1; }
            98% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Main layout */
        .main-container {
            position: relative;
            z-index: 10;
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Status bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 25px;
            font-size: 0.75rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            box-shadow: var(--glow-green);
            animation: pulse 2s infinite;
        }

        .status-dot.offline {
            background: var(--accent-red);
            box-shadow: 0 0 10px rgba(255, 23, 68, 0.4);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Prompt categories */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .category-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .category-card:hover {
            border-color: var(--accent-green);
            box-shadow: var(--glow-green);
            transform: translateY(-2px);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: var(--bg-tertiary);
            cursor: pointer;
            user-select: none;
        }

        .category-header h3 {
            font-size: 0.9rem;
            color: var(--accent-cyan);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .category-header .arrow {
            color: var(--text-muted);
            transition: transform 0.3s;
            font-size: 0.8rem;
        }

        .category-header.active .arrow {
            transform: rotate(180deg);
        }

        .category-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .category-body.open {
            max-height: 2000px;
        }

        /* Prompt items */
        .prompt-item {
            padding: 14px 18px;
            border-top: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .prompt-item:hover {
            background: rgba(0, 255, 65, 0.04);
        }

        .prompt-item .prompt-name {
            font-size: 0.82rem;
            color: var(--accent-green);
            margin-bottom: 4px;
        }

        .prompt-item .prompt-preview {
            font-size: 0.72rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90%;
        }

        .prompt-item .copy-badge {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.65rem;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .prompt-item:hover .copy-badge {
            opacity: 1;
        }

        /* Prompt viewer / editor */
        .prompt-viewer {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 25px;
        }

        .viewer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
        }

        .viewer-header h3 {
            font-size: 0.85rem;
            color: var(--accent-purple);
            letter-spacing: 2px;
        }

        .viewer-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 16px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.72rem;
            cursor: pointer;
            border-radius: 3px;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .btn:hover {
            border-color: var(--accent-green);
            color: var(--accent-green);
            box-shadow: var(--glow-green);
        }

        .btn.active {
            background: var(--accent-green);
            color: var(--bg-primary);
            border-color: var(--accent-green);
        }

        .viewer-body {
            padding: 18px;
        }

        .viewer-body textarea {
            width: 100%;
            min-height: 300px;
            background: var(--bg-primary);
            color: var(--accent-green);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 16px;
            font-family: inherit;
            font-size: 0.8rem;
            line-height: 1.6;
            resize: vertical;
            outline: none;
        }

        .viewer-body textarea:focus {
            border-color: var(--accent-cyan);
            box-shadow: var(--glow-cyan);
        }

        .viewer-body textarea::placeholder {
            color: var(--text-muted);
        }

        /* Custom prompt builder */
        .builder-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .builder-section h3 {
            font-size: 0.85rem;
            color: var(--accent-purple);
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .builder-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .builder-row input,
        .builder-row select {
            flex: 1;
            min-width: 200px;
            padding: 10px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.78rem;
            border-radius: 4px;
            outline: none;
        }

        .builder-row input:focus,
        .builder-row select:focus {
            border-color: var(--accent-cyan);
        }

        .builder-row select option {
            background: var(--bg-primary);
        }

        /* Terminal log */
        .terminal {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
        }

        .terminal-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .terminal-dot.red { background: #ff5f56; }
        .terminal-dot.yellow { background: #ffbd2e; }
        .terminal-dot.green { background: #27c93f; }

        .terminal-title {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-left: 8px;
        }

        .terminal-body {
            padding: 16px;
            max-height: 220px;
            overflow-y: auto;
            font-size: 0.75rem;
            line-height: 1.8;
        }

        .terminal-body .log-line {
            margin-bottom: 2px;
        }

        .log-line .timestamp {
            color: var(--text-muted);
        }

        .log-line .log-ok { color: var(--accent-green); }
        .log-line .log-warn { color: #ffbd2e; }
        .log-line .log-err { color: var(--accent-red); }
        .log-line .log-info { color: var(--accent-cyan); }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 24px;
            background: var(--bg-tertiary);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            font-family: inherit;
            font-size: 0.78rem;
            border-radius: 4px;
            box-shadow: var(--glow-green);
            z-index: 9999;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 20px;
            font-size: 0.7rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            margin-top: 40px;
        }

        .footer a {
            color: var(--accent-cyan);
            text-decoration: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-green); }

        /* Mobile */
        @media (max-width: 600px) {
            .header h1 { font-size: 2rem; letter-spacing: 6px; }
            .category-grid { grid-template-columns: 1fr; }
            .status-bar { flex-direction: column; gap: 8px; text-align: center; }
        }
    </style>
</head>
